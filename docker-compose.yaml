# docker-compose.yaml
# Adapted from the official Apache Airflow docker-compose.yaml (v2.8.1).
# Original: https://airflow.apache.org/docs/apache-airflow/2.8.1/docker-compose.yaml
#
# Modifications made for this coursework project:
#   - Switched CeleryExecutor → LocalExecutor (removes Redis, worker, triggerer)
#   - Added ./scripts volume so ETL package is importable inside containers
#   - Added ./config volume (required by Airflow; directory must exist locally)
#   - Added init_db.sh + init_db.sql mounts to auto-create weather_db on first start
#   - Exposed postgres port 5432 to host so Jupyter Notebook can connect
#   - Set a fixed Fernet key (fine for local dev — never commit to production)
#   - Disabled example DAGs (cleaner UI for coursework)
#   - Set _PIP_ADDITIONAL_REQUIREMENTS directly in the file (not via .env)
#   - Added PYTHONPATH=/opt/airflow so BashOperator subprocess can find 'scripts'
#   - Added all weather pipeline env vars (DB name, coordinates, city)
#   - Removed Redis, Celery worker, triggerer, flower, airflow-cli services
#   - Pinned postgres:15 (consistent with rest of project)

---
x-airflow-common:
  &airflow-common
  image: ${AIRFLOW_IMAGE_NAME:-apache/airflow:2.8.1}
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: 'ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg='
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    # Extra Python packages installed into every Airflow container at startup.
    # This is the official mechanism — avoids running pip inside bash commands.
    _PIP_ADDITIONAL_REQUIREMENTS: 'requests==2.31.0 pandas==2.1.4 psycopg2-binary==2.9.9 sqlalchemy==2.0.25 python-dotenv==1.0.0'
    # Required so BashOperator subprocesses can import the 'scripts' package.
    PYTHONPATH: /opt/airflow
    # ── Weather pipeline environment variables ─────────────────────────────────
    # These are read by scripts/config.py via os.getenv().
    POSTGRES_HOST: postgres        # Docker service name — resolves inside the network
    POSTGRES_PORT: '5432'
    POSTGRES_USER: airflow
    POSTGRES_PASSWORD: airflow
    WEATHER_DB: weather_db         # Separate DB from Airflow metadata
    LATITUDE: '6.9271'
    LONGITUDE: '79.8612'
    CITY_NAME: Colombo
  volumes:
    - ${AIRFLOW_PROJ_DIR:-.}/dags:/opt/airflow/dags
    - ${AIRFLOW_PROJ_DIR:-.}/logs:/opt/airflow/logs
    - ${AIRFLOW_PROJ_DIR:-.}/config:/opt/airflow/config   # must create ./config locally
    - ${AIRFLOW_PROJ_DIR:-.}/plugins:/opt/airflow/plugins
    - ${AIRFLOW_PROJ_DIR:-.}/scripts:/opt/airflow/scripts  # ETL package
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    &airflow-common-depends-on
    postgres:
      condition: service_healthy

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  # Single instance: hosts both the Airflow metadata DB and weather_db.
  postgres:
    image: postgres:15
    container_name: weather_postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow           # Airflow metadata database
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
      # init_db.sh and init_db.sql run ONCE on the very first container startup.
      # Docker executes .sh and .sql files in /docker-entrypoint-initdb.d/ in
      # alphabetical order. init_db.sh (runs first) creates weather_db and then
      # calls init_db.sql to create the weather_data table inside it.
      - ${AIRFLOW_PROJ_DIR:-.}/sql/init_db.sh:/docker-entrypoint-initdb.d/init_db.sh
      - ${AIRFLOW_PROJ_DIR:-.}/sql/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    ports:
      - "5432:5432"    # Exposed to host so Jupyter Notebook can connect via localhost
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  # ── Airflow initialisation ────────────────────────────────────────────────────
  # Runs once to migrate the Airflow metadata DB and create the admin user,
  # then exits with code 0. The webserver and scheduler wait for this to
  # complete successfully before starting (service_completed_successfully).
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /sources/logs /sources/dags /sources/plugins /sources/config /sources/scripts
        chown -R "${AIRFLOW_UID:-50000}:0" /sources/{logs,dags,plugins,config,scripts}
        exec /entrypoint airflow version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-admin}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-admin}
      _PIP_ADDITIONAL_REQUIREMENTS: ''   # skip pip install during init — not needed
    user: "0:0"
    volumes:
      - ${AIRFLOW_PROJ_DIR:-.}:/sources

  # ── Airflow Web UI ────────────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # ── Airflow Scheduler ─────────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres-db-volume:
